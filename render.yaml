services:
  - type: web
    name: chatcrm
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_PATH
        value: /var/data/chatcrm.db
    disk:
      name: chatcrm-data
      mountPath: /var/data
      sizeGB: 1
